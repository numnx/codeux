name: 💡 Feature request
description: Suggest an idea or enhancement for Code UX
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please search
        [existing issues](https://github.com/codeux-ai/codeux/issues) first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What's the use case?
      placeholder: When orchestrating sprints across multiple providers, I can't …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Code UX does this relate to?
      options:
        - Sprint orchestration / DAG
        - Providers (Jules, Claude Code, Codex, Gemini, Qwen, OpenCode, Antigravity)
        - Dashboard / UI
        - MCP server / tools
        - Docker / workspaces / previews
        - Git / CI / merge gating
        - Electron desktop app
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
