name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore node_modules cache
        id: nm-cache-typecheck
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.nm-cache-typecheck.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Restore compiler caches
        uses: actions/cache@v5
        with:
          path: .cache/tsc
          key: ${{ runner.os }}-tsc-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'tsconfig.json', 'dashboard/tsconfig.json') }}

      - name: Typecheck Backend & CLI
        run: pnpm run typecheck

      - name: Typecheck Dashboard
        run: pnpm run typecheck:dashboard

  test-backend:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore node_modules cache
        id: nm-cache-backend
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.nm-cache-backend.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Restore Vitest cache
        uses: actions/cache@v5
        with:
          path: .cache/vitest
          key: ${{ runner.os }}-vitest-backend-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'vitest.config.ts') }}

      - name: Run Backend Tests with Coverage
        run: pnpm run test:backend:coverage

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore node_modules cache
        id: nm-cache-dashboard
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.nm-cache-dashboard.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Restore Vitest cache
        uses: actions/cache@v5
        with:
          path: .cache/vitest
          key: ${{ runner.os }}-vitest-dashboard-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'vitest.config.ts') }}

      - name: Run Dashboard Tests
        run: pnpm run test:dashboard
