name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Restore Vite and Vitest caches
        uses: actions/cache@v5
        with:
          path: |
            .cache/vite
            .cache/vitest
            .cache/tsc
          key: ${{ runner.os }}-node-22-tooling-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'vite.config.ts', 'vitest.config.ts', 'tsconfig.json', 'dashboard/tsconfig.json') }}

      - name: Run consolidated CI verification
        run: pnpm run ci

      - name: Audit dependencies
        run: pnpm run audit
