name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: self-hosted

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts

      - name: Restore Vite and Vitest caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/vite
            .cache/vitest
            .cache/tsc
          key: ${{ runner.os }}-node-22-tooling-${{ hashFiles('package-lock.json', 'vite.config.ts', 'vitest.config.ts', 'tsconfig.json', 'dashboard/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-tooling-

      - name: Run consolidated CI verification
        run: npm run ci

      - name: Audit dependencies
        run: npm run audit
