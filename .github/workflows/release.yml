name: Release

# Publishes codeux to npm when a GitHub Release is published.
# Auth uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# The npm package must have this repo/workflow registered as a trusted
# publisher on npmjs.com (Settings → Trusted Publishers) before the first run.
on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (Trusted Publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi
          echo "Version check OK: $TAG"

      - name: Typecheck
        run: |
          pnpm run typecheck
          pnpm run typecheck:dashboard

      - name: Test (backend + dashboard)
        run: |
          pnpm run test:backend:coverage
          pnpm run test:dashboard

      # `npm publish` runs the `prepack` hook (pnpm run build) to produce a
      # fresh dist/ + dashboard/dist before packing, and performs the OIDC
      # token exchange automatically when id-token:write is granted.
      # `publishConfig` in package.json sets access=public and provenance=true.
      - name: Publish to npm
        run: npm publish
