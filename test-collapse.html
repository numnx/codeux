<!DOCTYPE html>
<html>
<head>
<style>
  .collapsible-section {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 500ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .collapsible-section.open {
    grid-template-rows: 1fr;
  }
  .collapsible-content {
    overflow: hidden;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 400ms ease, transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .collapsible-section.open .collapsible-content {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 80ms;
  }
</style>
</head>
<body>
  <div class="collapsible-section" id="c" style="border: 1px solid red;">
    <div class="collapsible-content" style="background: yellow;">
      <div style="height: 100px;">Content</div>
    </div>
  </div>
  <button onclick="document.getElementById('c').classList.toggle('open')">Toggle</button>
</body>
</html>
