<!DOCTYPE html>
<html>
<head>
<style>
  .nav {
    position: relative;
    width: 200px;
    height: 100px;
    overflow-x: auto;
    background: #ccc;
    white-space: nowrap;
  }
  .content {
    display: flex;
    gap: 10px;
  }
  .item {
    display: inline-block;
    min-width: 100px;
    height: 50px;
    background: #f00;
  }
  .indicator {
    position: absolute;
    bottom: 10px;
    width: 20px;
    height: 5px;
    background: #00f;
  }
</style>
</head>
<body>
  <div class="nav" id="nav">
    <div class="indicator" id="indicator"></div>
    <div class="content">
      <div class="item" id="item1"></div>
      <div class="item" id="item2"></div>
      <div class="item" id="item3"></div>
      <div class="item" id="item4"></div>
    </div>
  </div>
  <script>
    const nav = document.getElementById('nav');
    const indicator = document.getElementById('indicator');
    const item = document.getElementById('item3'); // The 3rd item

    function update() {
      // the real logic uses offsetLeft
      const center = item.offsetLeft + (item.offsetWidth / 2);
      indicator.style.left = (center - 10) + 'px';
    }

    update();
    nav.addEventListener('scroll', update);
  </script>
</body>
</html>
