<!DOCTYPE html>
<html>
<head>
<style>
  .nav {
    position: relative;
    width: 200px;
    height: 100px;
    overflow-x: auto;
    background: #ccc;
    white-space: nowrap;
  }
  .content {
    display: flex;
    gap: 10px;
  }
  .item {
    display: inline-block;
    min-width: 100px;
    height: 50px;
    background: #f00;
  }
  .indicator {
    position: absolute;
    bottom: 10px;
    left: 110px; /* Under the second item */
    width: 20px;
    height: 5px;
    background: #00f;
  }
</style>
</head>
<body>
  <div class="nav" id="nav">
    <div class="indicator"></div>
    <div class="content">
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>
  </div>
</body>
</html>
