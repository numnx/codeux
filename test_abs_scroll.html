<!DOCTYPE html>
<html>
<head>
<style>
  .nav {
    position: relative;
    width: 200px;
    height: 100px;
    overflow-x: auto;
    background: #ccc;
    display: flex; /* flex container */
    padding: 10px;
  }
  .item {
    min-width: 100px;
    height: 50px;
    background: #f00;
    margin-right: 10px;
  }
  .indicator {
    position: absolute;
    bottom: 10px;
    left: 150px;
    width: 20px;
    height: 5px;
    background: #00f;
  }
</style>
</head>
<body>
  <div class="nav" id="nav">
    <div class="indicator"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
  </div>
</body>
</html>
